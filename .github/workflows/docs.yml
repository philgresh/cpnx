name: Docs

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write  # mike pushes the built site to the gh-pages branch

jobs:
  deploy:
    name: Build and deploy versioned docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # mike needs full history of the gh-pages branch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs dependencies
        run: pip install -e ".[docs]"

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy with mike
        run: |
          VERSION="${GITHUB_REF_NAME#v}"   # v0.3.0 -> 0.3.0
          MINOR="${VERSION%.*}"            # 0.3.0 -> 0.3
          git fetch origin gh-pages --depth=1 || true
          mike deploy --push --update-aliases --title "$VERSION" "$MINOR" latest
          mike set-default --push latest
