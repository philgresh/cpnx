name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        include:
          - python-version: "3.14"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: pip install -e ".[dev]"
      - run: ruff check src/ tests/
      - name: Complexity gate (radon, rank A/B only)
        run: |
          radon cc src/cpnx -s -a
          bad=$(radon cc src/cpnx --min C -s)
          if [ -n "$bad" ]; then echo "Complexity gate FAILED — rank C or worse:"; echo "$bad"; exit 1; fi
          echo "Complexity gate passed."
      - run: pytest tests/ -v
        continue-on-error: ${{ matrix.experimental == true }}

  docs:
    name: Docs build (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[docs]"
      - run: mkdocs build --strict
