site_name: cpnx
site_description: Coloured Petri Net executor for concurrent Python pipelines
site_url: https://philgresh.github.io/cpnx/
repo_url: https://github.com/philgresh/cpnx
repo_name: philgresh/cpnx
copyright: Copyright &copy; Phil Gresham — MIT License

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.integrate  # surface each page's symbols (classes, methods) in the left nav
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
  - mike:
      canonical_version: latest

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/philgresh/cpnx
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/cpnx/
      name: cpnx on PyPI

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference:
      - Core: reference/core.md
      - Transitions: reference/transitions.md
      - Places: reference/places.md
      - Tokens: reference/tokens.md
      - Visualization: reference/visualization.md
