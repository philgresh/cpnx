site_name: cpnx
site_description: Coloured Petri Net executor for concurrent Python pipelines
site_url: https://philgresh.github.io/cpnx/
repo_url: https://github.com/philgresh/cpnx
repo_name: philgresh/cpnx
copyright: Copyright &copy; Phil Gresham — MIT License

# Internal engineering docs (theory audit, ADRs, agent handoffs) live in the repo for
# contributors and on GitHub, but are not part of the rendered API-documentation site.
# Excluding them keeps `mkdocs build --strict` green (no orphan-page warnings).
exclude_docs: |
  cpn-theory-audit.md
  handoff-cpn-binding-evaluation.md
  adr/

theme:
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.top
    - navigation.sections
    - navigation.expand
    - toc.integrate  # surface each page's symbols (classes, methods) in the left nav
    - search.suggest
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - include-markdown
  - mkdocstrings:
      handlers:
        python:
          # ``benchmarks`` joins ``src`` on the path so the ☕ Concurrency Cafe fixture
          # (``benchmarks/cafe/``) can be rendered on its own page. The cafe is not part
          # of the shipped package, but each of its stations is documented as a worked
          # example of one net feature, which is worth surfacing on the site.
          paths: [src, benchmarks]
          options:
            docstring_style: google
            show_source: true
            show_signature: true
            show_signature_annotations: true
            separate_signature: true
            members_order: source
            show_root_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
  - llmstxt:
      # Generates /llms.txt (curated index) and /llms-full.txt (full content)
      # for LLM-friendly consumption. Listed after mkdocstrings so it captures
      # the rendered API reference.
      # base_url points at the canonical `latest` alias, since mike deploys the
      # whole site into /cpnx/latest/ (and /cpnx/<version>/) — without this the
      # generated links would omit the version path and 404.
      base_url: https://philgresh.github.io/cpnx/latest/
      full_output: llms-full.txt
      markdown_description: >-
        cpnx is a Coloured Petri Net (CPN) executor for concurrent Python
        pipelines — zero dependencies, stdlib-only threading. It models
        resource-constrained workflows (GPU slots, API rate limits, connection
        pools) as a Coloured Petri Net where transitions execute real work on
        thread pools and resource tokens are returned atomically on failure.
      sections:
        Home:
          - index.md
        Worked example:
          - cafe.md
        API reference:
          - reference/core.md
          - reference/transitions.md
          - reference/places.md
          - reference/tokens.md
          - reference/visualization.md
  - mike:
      canonical_version: latest

extra:
  version:
    provider: mike
    default: latest
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/philgresh/cpnx
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/cpnx/
      name: cpnx on PyPI

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - The Concurrency Cafe: cafe.md
  - API Reference:
      - Core: reference/core.md
      - Transitions: reference/transitions.md
      - Places: reference/places.md
      - Tokens: reference/tokens.md
      - Visualization: reference/visualization.md
